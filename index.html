<!DOCTYPE html>
<!-- ============================================================
  3D LOVE - Aplikasi 3D Interaktif dengan Three.js & MediaPipe
  Menampilkan partikel membentuk LOVE, hand tracking, dan foto
  ============================================================ -->
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Viewport: responsif di mobile, cegah zoom user -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIPUT PIC</title>

    <!-- Favicon inline (emoji hati) agar tidak 404 saat browser cari /favicon.ico -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
    
    <!-- CSS Eksternal -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Import Map: Mendefinisikan URL untuk modul Three.js & MediaPipe -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
</head>
<body>

    <!-- ============================================================
    LOADING SCREEN - Tampil saat aplikasi memuat aset 3D
    ============================================================ -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading Memories</div>
    </div>

    <!-- ============================================================
    CANVAS 3D - Wadah untuk render Three.js
    ============================================================ -->
    <div id="canvas-container"></div>

    <!-- ============================================================
    AUDIO - Musik latar (playlist diatur via JS, lihat CONFIG.playlist)
    ============================================================ -->
    <audio id="bgm" preload="auto"></audio>

    <!-- ============================================================
    TITLE - Judul "3D Love" di bagian atas
    ============================================================ -->
    <div id="title"><h1>CIPUT PIC</h1></div>

    <!-- ============================================================
    MODE INDICATOR - Menampilkan mode aktif (LOVE / SCATTER / FOCUS)
    ============================================================ -->
    <div id="mode-indicator">❤ LOVE</div>

    <!-- ============================================================
    PHOTO CAPTION - Menampilkan caption foto saat mode FOCUS aktif
    ============================================================ -->
    <div id="photo-caption"></div>

    <!-- ============================================================
    EASTER EGG - Flash & notifikasi saat screenshot diambil (trigger: peace sign ditahan 2 detik)
    ============================================================ -->
    <div id="capture-flash"></div>
    <div id="capture-notif">📸 Tersimpan!</div>

    <!-- ============================================================
    TOUCH HINT - Petunjuk gesture untuk pengguna mobile
    ============================================================ -->
    <div id="touch-hint">Seret untuk putar • Pinch untuk zoom</div>

    <!-- ============================================================
    BOTTOM BAR - Kontrol bawah: webcam preview & tombol
    ============================================================ -->
    <div id="bottom-bar">
        
        <!-- Webcam Preview - Menampilkan kamera untuk hand tracking -->
        <div id="webcam-wrapper">
            <div id="webcam-inner">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="overlay-canvas"></canvas>
                <div id="debug-info">Memulai...</div>
            </div>
        </div>

        <!-- Tombol Kontrol: Musik & Kamera -->
        <div id="right-controls">
            <div id="track-name"></div>
            <div id="music-controls">
                <button id="play-btn" class="upload-btn">🎵 Musik</button>
                <button id="next-track-btn" class="upload-btn hidden">⏭ Next</button>
            </div>
            <button id="cam-toggle-btn" class="upload-btn">📷 Kamera</button>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT UTAMA - Module Three.js & MediaPipe
    ============================================================ -->
    <script type="module" src="assets/js/script.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
