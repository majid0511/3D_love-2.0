<!DOCTYPE html>
<!-- ============================================================
  3D LOVE - Aplikasi 3D Interaktif dengan Three.js & MediaPipe
  Menampilkan partikel membentuk LOVE, hand tracking, dan foto
  ============================================================ -->
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Viewport: responsif di mobile, cegah zoom user -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIPUT PIC</title>
    
    <!-- CSS Eksternal -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Import Map: Mendefinisikan URL untuk modul Three.js & MediaPipe -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
</head>
<body>

    <!-- ============================================================
    LOADING SCREEN - Tampil saat aplikasi memuat aset 3D
    ============================================================ -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading Memories</div>
    </div>

    <!-- ============================================================
    CANVAS 3D - Wadah untuk render Three.js
    ============================================================ -->
    <div id="canvas-container"></div>

    <!-- ============================================================
    AUDIO - Musik latar (auto-loop)
    ============================================================ -->
    <audio id="bgm" loop preload="auto">
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <!-- ============================================================
    TITLE - Judul "3D Love" di bagian atas
    ============================================================ -->
    <div id="title"><h1>CIPUT PIC</h1></div>

    <!-- ============================================================
    MODE INDICATOR - Menampilkan mode aktif (LOVE / SCATTER / FOCUS)
    ============================================================ -->
    <div id="mode-indicator">❤ LOVE</div>

    <!-- ============================================================
    TOUCH HINT - Petunjuk gesture untuk pengguna mobile
    ============================================================ -->
    <div id="touch-hint">Seret untuk putar • Pinch untuk zoom</div>

    <!-- ============================================================
    BOTTOM BAR - Kontrol bawah: webcam preview & tombol
    ============================================================ -->
    <div id="bottom-bar">
        
        <!-- Webcam Preview - Menampilkan kamera untuk hand tracking -->
        <div id="webcam-wrapper">
            <div id="webcam-inner">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="webcam-preview" style="display:none;"></canvas>
                <div id="debug-info">Memulai...</div>
            </div>
        </div>

        <!-- Tombol Kontrol: Musik & Kamera -->
        <div id="right-controls">
            <button id="play-btn" class="upload-btn">🎵 Musik</button>
            <button id="cam-toggle-btn" class="upload-btn">📷 Kamera</button>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT UTAMA - Module Three.js & MediaPipe
    ============================================================ -->
    <script type="module" src="assets/js/script.js"></script>
</body>
</html>
